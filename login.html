<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SnapLedger — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:linear-gradient(135deg,#EEF2FF 0%,#DBEAFE 100%);color:#0F172A;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:100%;max-width:400px;background:#FFFFFF;border:1px solid #E2E8F0;
  border-radius:20px;padding:36px 32px;box-shadow:0 8px 40px rgba(37,99,235,.12);}
.logo{display:flex;align-items:center;gap:14px;margin-bottom:32px;}
.logo-icon{width:52px;height:52px;background:linear-gradient(135deg,#2563EB,#3B82F6);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:24px;box-shadow:0 4px 16px rgba(37,99,235,.35);}
.logo-text h1{font-size:22px;font-weight:800;color:#0F172A;}
.logo-text p{font-size:12px;color:#64748B;margin-top:3px;}
.field{margin-bottom:16px;}
label{display:block;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:6px;}
input{width:100%;background:#F8FAFF;border:1.5px solid #E2E8F0;border-radius:10px;
  padding:12px 14px;color:#0F172A;font-size:15px;outline:none;transition:border .2s;}
input:focus{border-color:#2563EB;background:#fff;}
input::placeholder{color:#94A3B8;}
.btn{width:100%;background:linear-gradient(135deg,#2563EB,#3B82F6);color:white;border:none;
  border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;
  margin-top:8px;transition:opacity .2s;box-shadow:0 4px 14px rgba(37,99,235,.35);}
.btn:active{opacity:.88;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{color:#DC2626;font-size:13px;margin-top:10px;text-align:center;min-height:20px;}
.footer{text-align:center;margin-top:24px;font-size:11px;color:#94A3B8;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📄</div>
    <div class="logo-text">
      <h1>SnapLedger</h1>
      <p>AI Document Intelligence</p>
    </div>
  </div>
  <div class="field">
    <label>Company Code</label>
    <input id="company-code" type="text" placeholder="e.g. PHONES2026" autocomplete="off" oninput="this.value=this.value.toUpperCase()">
  </div>
  <div class="field">
    <label>Username</label>
    <input id="username" type="text" placeholder="Your username">
  </div>
  <div class="field">
    <label>Password</label>
    <input id="password" type="password" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn" id="btn-login" onclick="doLogin()">Sign In</button>
  <div class="err" id="err"></div>
  <div class="footer">SnapLedger © 2026 — Scan smarter, not harder.</div>
</div>
<script>
async function doLogin() {
  const btn  = document.getElementById("btn-login");
  const err  = document.getElementById("err");
  const code = document.getElementById("company-code").value.trim();
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();
  if (!code || !user || !pass) { err.textContent = "All fields required."; return; }
  btn.disabled = true; btn.textContent = "Signing in..."; err.textContent = "";
  try {
    const r    = await fetch("/api/auth/login", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({company_code: code, username: user, password: pass})
    });
    const data = await r.json();
    if (data.success) { window.location.replace("/app"); }
    else { err.textContent = data.error || "Login failed."; }
  } catch(e) { err.textContent = "Network error. Try again."; }
  btn.disabled = false; btn.textContent = "Sign In";
}
</script>
</body>
</html>
